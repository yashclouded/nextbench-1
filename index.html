<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Nextbench</title>
    <meta name="description" content="The premiere verified student-to-student marketplace. Buy, sell, and trade within your trusted campus community." />
    <meta name="theme-color" content="#091A1D" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nextbench" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Nextbench" />
    <meta property="og:description" content="Exclusive campus marketplace for verified students. Buy and sell with trust." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nextbench.in" />
    <style>
      /* Instant loading screen — shown before any JS runs */
      :root {
        --loader-bg: #fafaf8;
        --loader-text: #091A1D;
        --loader-subtle: rgba(9, 26, 29, 0.15);
        --loader-accent: #4ECDC4;
      }
      .loader-dark {
        --loader-bg: #0a1a1d;
        --loader-text: #fafaf8;
        --loader-subtle: rgba(255,255,255,0.1);
        --loader-accent: #4ECDC4;
      }
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--loader-bg);
        z-index: 9999;
        gap: 16px;
        transition: opacity 0.35s ease;
      }
      #app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading img {
        width: 40px;
        height: 40px;
        animation: nb-pulse 1.6s ease-in-out infinite;
      }
      #app-loading .loader-bar {
        width: 120px;
        height: 3px;
        border-radius: 3px;
        background: var(--loader-subtle);
        overflow: hidden;
        margin-top: 4px;
      }
      #app-loading .loader-bar-fill {
        width: 40%;
        height: 100%;
        border-radius: 3px;
        background: var(--loader-accent);
        animation: nb-slide 1.2s ease-in-out infinite;
      }
      @keyframes nb-pulse {
        0%, 100% { opacity: 0.85; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      @keyframes nb-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
    <script>
      // Apply saved theme to loading screen immediately
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('loader-dark');
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <!-- Instant loading screen: visible before React mounts -->
    <div id="app-loading" class="">
      <img src="/logo.png" alt="Nextbench" />
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide the loading screen once React has mounted
      window.__hideAppLoading = function() {
        window.__appLoaded = true;
        var el = document.getElementById('app-loading');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 350);
        }
      };

      // Robust error handling for PWA chunk failures and runtime crashes
      window.addEventListener('error', function(e) {
        // If the app successfully loaded already, let ErrorBoundary handle it
        if (window.__appLoaded) return;

        console.error('Initial load error:', e);

        var el = document.getElementById('app-loading');
        if (!el) return;

        // If it's a script load error (e.g., 404 for an old chunk due to stale SW cache)
        if (e.target && e.target.tagName === 'SCRIPT') {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (var i = 0; i < regs.length; i++) {
                regs[i].unregister();
              }
              // Prevent infinite reload loops by checking session storage
              if (!sessionStorage.getItem('sw_fallback_reloaded')) {
                sessionStorage.setItem('sw_fallback_reloaded', 'true');
                window.location.reload();
              } else {
                el.innerHTML = '<p style="color:white;font-family:sans-serif;padding:20px;text-align:center;">Failed to load app. Please clear your browser cache.</p>';
              }
            });
          }
        } else {
          // Runtime error during module evaluation
          el.innerHTML = '<p style="color:white;font-family:sans-serif;padding:20px;text-align:center;">An unexpected error occurred while loading. Please refresh.</p>';
        }
      }, true); // Use capture phase to catch script errors
    </script>
  </body>
</html>
